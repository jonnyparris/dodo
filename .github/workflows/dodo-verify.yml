name: dodo-verify

# External typecheck + test gate for dispatches. The Dodo MCP dispatches this
# workflow via workflow_dispatch after a successful branch push, then polls
# for completion before opening a draft PR. See src/github-actions.ts.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Ref the dispatcher wants verified (informational — the workflow runs on the dispatched ref by default)
        required: false
        type: string
  # Run on PRs so human-authored branches get the same typecheck/test signal
  # without double-running on every push.
  pull_request:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Lint (Biome)
        # External lint gate. Biome can't run in-isolate (8 MB gzip wasm
        # bundle exceeds the Workers script size limit), so this job is
        # the agent's only feedback loop for unused-imports / suspicious
        # patterns. The in-isolate `typecheck` tool with extraStrict:true
        # covers the TypeScript-side overlap.
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Typecheck smoke (in-isolate tsc tool)
        run: npm run test:typecheck-smoke
