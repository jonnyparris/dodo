<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 620" fill="none">
  <defs>
    <linearGradient id="hono" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="shared" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="user" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="agent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="storage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="artifact" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a3e635"/>
      <stop offset="100%" stop-color="#65a30d"/>
    </linearGradient>
    <filter id="s" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <style>
      a { cursor: pointer; }
      a:hover rect { filter: brightness(1.15); }
      a:hover text { fill: #ffffff; }
      a text { transition: fill 120ms; }
    </style>
  </defs>

  <rect width="920" height="620" rx="16" fill="#0f172a"/>

  <!-- Title -->
  <text x="460" y="38" text-anchor="middle" fill="#f8fafc" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700">Dodo Architecture</text>
  <text x="460" y="58" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">One Worker, three Durable Objects, everything in your Cloudflare account</text>

  <!-- Left: Clients -->
  <a href="https://github.com/jonnyparris/dodo#quick-start" target="_blank">
    <g filter="url(#s)">
      <rect x="20" y="140" width="130" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
      <text x="85" y="165" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="12" font-weight="500">Web UI</text>
    </g>
  </a>
  <a href="https://github.com/jonnyparris/dodo#connect-via-mcp" target="_blank">
    <g filter="url(#s)">
      <rect x="20" y="194" width="130" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
      <text x="85" y="219" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="12" font-weight="500">MCP Client</text>
    </g>
  </a>
  <a href="https://github.com/jonnyparris/dodo/blob/main/docs/testing.md" target="_blank">
    <g filter="url(#s)">
      <rect x="20" y="248" width="130" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
      <text x="85" y="273" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="12" font-weight="500">API / CLI</text>
    </g>
  </a>
  <a href="https://github.com/jonnyparris/dodo#scheduling" target="_blank">
    <g filter="url(#s)">
      <rect x="20" y="302" width="130" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
      <text x="85" y="327" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="12" font-weight="500">Scheduled cron</text>
    </g>
  </a>

  <!-- Arrows to Worker -->
  <line x1="150" y1="160" x2="215" y2="205" stroke="#475569" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="150" y1="214" x2="215" y2="220" stroke="#475569" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="150" y1="268" x2="215" y2="235" stroke="#475569" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="150" y1="322" x2="215" y2="250" stroke="#475569" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Worker box -->
  <a href="https://developers.cloudflare.com/workers/" target="_blank">
    <g filter="url(#s)">
      <rect x="215" y="100" width="180" height="360" rx="14" fill="#1e293b" stroke="url(#hono)" stroke-width="2"/>
      <rect x="215" y="100" width="180" height="36" rx="14" fill="url(#hono)"/>
      <rect x="215" y="122" width="180" height="14" fill="url(#hono)"/>
      <text x="305" y="124" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Cloudflare Worker</text>
    </g>
  </a>

  <a href="https://hono.dev/" target="_blank">
    <g>
      <rect x="229" y="150" width="152" height="26" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <text x="305" y="168" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="10" font-weight="500">Hono Router</text>
    </g>
  </a>

  <a href="https://developers.cloudflare.com/cloudflare-one/applications/configure-apps/self-hosted-public-app/" target="_blank">
    <g>
      <rect x="229" y="184" width="152" height="26" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <text x="305" y="202" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="10" font-weight="500">Auth (Access / Single-user)</text>
    </g>
  </a>

  <a href="https://modelcontextprotocol.io/" target="_blank">
    <g>
      <rect x="229" y="218" width="152" height="26" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <text x="305" y="236" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="10" font-weight="500">MCP Server (47 tools)</text>
    </g>
  </a>

  <g>
    <rect x="229" y="252" width="152" height="26" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="305" y="270" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="10" font-weight="500">JSON-RPC API</text>
  </g>

  <a href="https://developer.mozilla.org/en-US/docs/Web/API/Server-sent_events" target="_blank">
    <g>
      <rect x="229" y="286" width="152" height="26" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <text x="305" y="304" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="10" font-weight="500">SSE Streaming</text>
    </g>
  </a>

  <a href="https://developers.cloudflare.com/workers/static-assets/" target="_blank">
    <g>
      <rect x="229" y="320" width="152" height="26" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <text x="305" y="338" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="10" font-weight="500">Static Assets (UI)</text>
    </g>
  </a>

  <a href="https://github.com/jonnyparris/dodo#orchestration" target="_blank">
    <g>
      <rect x="229" y="354" width="152" height="26" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <text x="305" y="372" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="10" font-weight="500">Orchestration gate</text>
    </g>
  </a>

  <a href="https://developers.cloudflare.com/workers/configuration/cron-triggers/" target="_blank">
    <g>
      <rect x="229" y="388" width="152" height="26" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
      <text x="305" y="406" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">Cron: every 6 hours</text>
    </g>
  </a>

  <a href="https://developers.cloudflare.com/workers/runtime-apis/bindings/outbound/" target="_blank">
    <g>
      <rect x="229" y="422" width="152" height="26" rx="6" fill="#052e16" stroke="#22c55e" stroke-width="1"/>
      <text x="305" y="440" text-anchor="middle" fill="#4ade80" font-family="system-ui, sans-serif" font-size="10" font-weight="600">AllowlistOutbound</text>
    </g>
  </a>

  <!-- Arrows from Worker to DOs -->
  <line x1="395" y1="170" x2="440" y2="140" stroke="#10b981" stroke-width="1.5"/>
  <line x1="395" y1="230" x2="440" y2="285" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="395" y1="320" x2="440" y2="445" stroke="#8b5cf6" stroke-width="1.5"/>

  <!-- SharedIndex DO -->
  <a href="https://developers.cloudflare.com/durable-objects/" target="_blank">
    <g filter="url(#s)">
      <rect x="440" y="92" width="200" height="120" rx="12" fill="#1e293b" stroke="url(#shared)" stroke-width="2"/>
      <rect x="440" y="92" width="200" height="30" rx="12" fill="url(#shared)"/>
      <rect x="440" y="108" width="200" height="14" fill="url(#shared)"/>
      <text x="540" y="113" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="11" font-weight="700">SharedIndex DO</text>
      <text x="540" y="128" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="9">Global singleton</text>
      <text x="454" y="150" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">&#x2022; User registry + allowlist</text>
      <text x="454" y="166" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Session sharing + permissions</text>
      <text x="454" y="182" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Host allowlist for sandbox</text>
      <text x="454" y="198" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Models cache (gateway-filtered)</text>
    </g>
  </a>

  <!-- UserControl DO -->
  <a href="https://developers.cloudflare.com/durable-objects/api/storage-api/" target="_blank">
    <g filter="url(#s)">
      <rect x="440" y="234" width="200" height="150" rx="12" fill="#1e293b" stroke="url(#user)" stroke-width="2"/>
      <rect x="440" y="234" width="200" height="30" rx="12" fill="url(#user)"/>
      <rect x="440" y="250" width="200" height="14" fill="url(#user)"/>
      <text x="540" y="255" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="11" font-weight="700">UserControl DO</text>
      <text x="540" y="270" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="9">One per user (keyed by email)</text>
      <text x="454" y="292" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">&#x2022; LLM config + model selection</text>
      <text x="454" y="308" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Session index + worker runs</text>
      <text x="454" y="324" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Memory (key-value + search)</text>
      <text x="454" y="340" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Task board (kanban)</text>
      <text x="454" y="356" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Encrypted secrets (AES-GCM)</text>
      <text x="454" y="372" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Dispatch state + PR tracking</text>
    </g>
  </a>

  <!-- CodingAgent DO -->
  <a href="https://github.com/jonnyparris/dodo#agentic-loop" target="_blank">
    <g filter="url(#s)">
      <rect x="440" y="406" width="200" height="166" rx="12" fill="#1e293b" stroke="url(#agent)" stroke-width="2"/>
      <rect x="440" y="406" width="200" height="30" rx="12" fill="url(#agent)"/>
      <rect x="440" y="422" width="200" height="14" fill="url(#agent)"/>
      <text x="540" y="427" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="11" font-weight="700">CodingAgent DO</text>
      <text x="540" y="442" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="9">One per session</text>
      <text x="454" y="464" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Chat loop + durable fibers</text>
      <text x="454" y="480" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Workspace (files + git)</text>
      <text x="454" y="496" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Sandboxed JS execution</text>
      <text x="454" y="512" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Prompt scheduling (cron/once)</text>
      <text x="454" y="528" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Token budget + compaction</text>
      <text x="454" y="544" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Doom loop detection</text>
      <text x="454" y="560" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Artifacts flush per turn</text>
    </g>
  </a>

  <!-- Right side: Bindings -->
  <!-- R2 -->
  <line x1="640" y1="130" x2="685" y2="130" stroke="#475569" stroke-width="1.5"/>
  <a href="https://developers.cloudflare.com/r2/" target="_blank">
    <g filter="url(#s)">
      <rect x="685" y="108" width="170" height="46" rx="8" fill="#1e293b" stroke="url(#storage)" stroke-width="1.5"/>
      <text x="770" y="128" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="11" font-weight="600">R2 Storage</text>
      <text x="770" y="144" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="9">Files + attachments (30d TTL)</text>
    </g>
  </a>

  <!-- Artifacts repo -->
  <line x1="640" y1="195" x2="685" y2="195" stroke="#475569" stroke-width="1.5"/>
  <a href="https://github.com/jonnyparris/dodo#artifacts" target="_blank">
    <g filter="url(#s)">
      <rect x="685" y="165" width="170" height="60" rx="8" fill="#1e293b" stroke="url(#artifact)" stroke-width="1.5"/>
      <text x="770" y="184" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Artifacts</text>
      <text x="770" y="200" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="9">Per-session Cloudflare repo</text>
      <text x="770" y="215" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="9">(auto-fork on session fork)</text>
    </g>
  </a>

  <!-- Browser Rendering -->
  <line x1="640" y1="265" x2="685" y2="265" stroke="#475569" stroke-width="1.5"/>
  <a href="https://developers.cloudflare.com/browser-rendering/" target="_blank">
    <g filter="url(#s)">
      <rect x="685" y="240" width="170" height="46" rx="8" fill="#1e293b" stroke="#f97316" stroke-width="1.5"/>
      <text x="770" y="260" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Browser Rendering</text>
      <text x="770" y="276" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="9">Headless Chrome (CDP)</text>
    </g>
  </a>

  <!-- LLM Gateway -->
  <line x1="640" y1="330" x2="685" y2="330" stroke="#475569" stroke-width="1.5"/>
  <a href="https://developers.cloudflare.com/ai-gateway/" target="_blank">
    <g filter="url(#s)">
      <rect x="685" y="300" width="170" height="60" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="770" y="320" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="11" font-weight="600">LLM Gateway</text>
      <text x="770" y="336" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="9">OpenCode / AI Gateway</text>
      <text x="770" y="350" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="9">(+ Workers AI via AI Gateway)</text>
    </g>
  </a>

  <!-- GitHub Actions verify -->
  <line x1="640" y1="410" x2="685" y2="410" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <a href="https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#workflow_dispatch" target="_blank">
    <g filter="url(#s)">
      <rect x="685" y="380" width="170" height="60" rx="8" fill="#1e293b" stroke="#94a3b8" stroke-width="1.5"/>
      <text x="770" y="400" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="11" font-weight="600">GitHub Actions</text>
      <text x="770" y="416" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="9">Opt-in verify gate</text>
      <text x="770" y="430" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="9">(typecheck + tests)</text>
    </g>
  </a>

  <!-- ntfy -->
  <line x1="640" y1="478" x2="685" y2="478" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <a href="https://ntfy.sh/" target="_blank">
    <g filter="url(#s)">
      <rect x="685" y="455" width="170" height="46" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
      <text x="770" y="475" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="11" font-weight="600">ntfy.sh</text>
      <text x="770" y="491" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="9">Run status push notifications</text>
    </g>
  </a>

  <!-- SQLite callout -->
  <a href="https://developers.cloudflare.com/durable-objects/best-practices/access-durable-objects-storage/" target="_blank">
    <g filter="url(#s)">
      <rect x="685" y="515" width="170" height="60" rx="8" fill="#172554" stroke="#3b82f6" stroke-width="1"/>
      <text x="770" y="535" text-anchor="middle" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Every DO uses SQLite</text>
      <text x="770" y="551" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="9">Messages, config, secrets, files,</text>
      <text x="770" y="565" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="9">tasks, runs -- all durable</text>
    </g>
  </a>

  <!-- Footer -->
  <text x="460" y="602" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="11">Your code, your models, your data. Dodo is the platform -- you bring the LLM.</text>
</svg>
