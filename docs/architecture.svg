<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 560" fill="none">
  <defs>
    <linearGradient id="hono" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="shared" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="user" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="agent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="storage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <filter id="s" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="860" height="560" rx="16" fill="#0f172a"/>

  <!-- Title -->
  <text x="430" y="38" text-anchor="middle" fill="#f8fafc" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700">Dodo Architecture</text>
  <text x="430" y="58" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">One Worker, three Durable Objects, everything in your Cloudflare account</text>

  <!-- Left: Clients -->
  <g filter="url(#s)">
    <rect x="20" y="130" width="130" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="85" y="155" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="12" font-weight="500">Web UI</text>
  </g>
  <g filter="url(#s)">
    <rect x="20" y="184" width="130" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="85" y="209" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="12" font-weight="500">MCP Client</text>
  </g>
  <g filter="url(#s)">
    <rect x="20" y="238" width="130" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="85" y="263" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="12" font-weight="500">API / CLI</text>
  </g>

  <!-- Arrows to Worker -->
  <line x1="150" y1="150" x2="195" y2="195" stroke="#475569" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="150" y1="204" x2="195" y2="210" stroke="#475569" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="150" y1="258" x2="195" y2="225" stroke="#475569" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Worker box -->
  <g filter="url(#s)">
    <rect x="195" y="90" width="180" height="340" rx="14" fill="#1e293b" stroke="url(#hono)" stroke-width="2"/>
    <rect x="195" y="90" width="180" height="36" rx="14" fill="url(#hono)"/>
    <rect x="195" y="112" width="180" height="14" fill="url(#hono)"/>
    <text x="285" y="114" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Cloudflare Worker</text>

    <rect x="209" y="140" width="152" height="26" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="285" y="158" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="10" font-weight="500">Hono Router</text>

    <rect x="209" y="174" width="152" height="26" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="285" y="192" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="10" font-weight="500">Auth (Access / Single-user)</text>

    <rect x="209" y="208" width="152" height="26" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="285" y="226" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="10" font-weight="500">MCP Server (46 tools)</text>

    <rect x="209" y="242" width="152" height="26" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="285" y="260" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="10" font-weight="500">JSON-RPC API</text>

    <rect x="209" y="276" width="152" height="26" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="285" y="294" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="10" font-weight="500">SSE Streaming</text>

    <rect x="209" y="310" width="152" height="26" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="285" y="328" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="10" font-weight="500">Static Assets (UI)</text>

    <rect x="209" y="350" width="152" height="26" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="285" y="368" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">Cron: every 6 hours</text>

    <rect x="209" y="386" width="152" height="26" rx="6" fill="#052e16" stroke="#22c55e" stroke-width="1"/>
    <text x="285" y="404" text-anchor="middle" fill="#4ade80" font-family="system-ui, sans-serif" font-size="10" font-weight="600">AllowlistOutbound</text>
  </g>

  <!-- Arrows from Worker to DOs -->
  <line x1="375" y1="160" x2="420" y2="130" stroke="#10b981" stroke-width="1.5"/>
  <line x1="375" y1="220" x2="420" y2="270" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="375" y1="300" x2="420" y2="430" stroke="#8b5cf6" stroke-width="1.5"/>

  <!-- SharedIndex DO -->
  <g filter="url(#s)">
    <rect x="420" y="82" width="200" height="120" rx="12" fill="#1e293b" stroke="url(#shared)" stroke-width="2"/>
    <rect x="420" y="82" width="200" height="30" rx="12" fill="url(#shared)"/>
    <rect x="420" y="98" width="200" height="14" fill="url(#shared)"/>
    <text x="520" y="103" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="11" font-weight="700">SharedIndex DO</text>
    <text x="520" y="118" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">Global singleton</text>
    <text x="434" y="140" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">&#x2022; User registry + allowlist</text>
    <text x="434" y="156" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Session sharing + permissions</text>
    <text x="434" y="172" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Host allowlist for sandbox</text>
    <text x="434" y="188" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Models cache</text>
  </g>

  <!-- UserControl DO -->
  <g filter="url(#s)">
    <rect x="420" y="224" width="200" height="150" rx="12" fill="#1e293b" stroke="url(#user)" stroke-width="2"/>
    <rect x="420" y="224" width="200" height="30" rx="12" fill="url(#user)"/>
    <rect x="420" y="240" width="200" height="14" fill="url(#user)"/>
    <text x="520" y="245" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="11" font-weight="700">UserControl DO</text>
    <text x="520" y="260" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">One per user (keyed by email)</text>
    <text x="434" y="282" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">&#x2022; LLM config + model selection</text>
    <text x="434" y="298" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Session index</text>
    <text x="434" y="314" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Memory (key-value + search)</text>
    <text x="434" y="330" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Task board (kanban)</text>
    <text x="434" y="346" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Encrypted secrets (AES-GCM)</text>
    <text x="434" y="362" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Orchestration state</text>
  </g>

  <!-- CodingAgent DO -->
  <g filter="url(#s)">
    <rect x="420" y="396" width="200" height="148" rx="12" fill="#1e293b" stroke="url(#agent)" stroke-width="2"/>
    <rect x="420" y="396" width="200" height="30" rx="12" fill="url(#agent)"/>
    <rect x="420" y="412" width="200" height="14" fill="url(#agent)"/>
    <text x="520" y="417" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="11" font-weight="700">CodingAgent DO</text>
    <text x="520" y="432" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">One per session (extends Think)</text>
    <text x="434" y="454" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Chat loop + fibers</text>
    <text x="434" y="470" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Workspace (files + git)</text>
    <text x="434" y="486" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Sandboxed code execution</text>
    <text x="434" y="502" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Prompt scheduling (cron)</text>
    <text x="434" y="518" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Token budget management</text>
    <text x="434" y="534" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Doom loop detection</text>
  </g>

  <!-- Right side: Bindings -->
  <line x1="620" y1="440" x2="665" y2="400" stroke="#475569" stroke-width="1.5"/>
  <line x1="620" y1="460" x2="665" y2="460" stroke="#475569" stroke-width="1.5"/>
  <line x1="620" y1="480" x2="665" y2="510" stroke="#475569" stroke-width="1.5"/>

  <!-- R2 -->
  <g filter="url(#s)">
    <rect x="665" y="378" width="170" height="46" rx="8" fill="#1e293b" stroke="url(#storage)" stroke-width="1.5"/>
    <text x="750" y="398" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="11" font-weight="600">R2 Storage</text>
    <text x="750" y="414" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="9">Large files (SQLite spill)</text>
  </g>

  <!-- Browser Rendering -->
  <g filter="url(#s)">
    <rect x="665" y="436" width="170" height="46" rx="8" fill="#1e293b" stroke="#f97316" stroke-width="1.5"/>
    <text x="750" y="456" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Browser Rendering</text>
    <text x="750" y="472" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="9">Headless Chrome (CDP)</text>
  </g>

  <!-- LLM Gateway -->
  <g filter="url(#s)">
    <rect x="665" y="494" width="170" height="46" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="750" y="514" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="11" font-weight="600">LLM Gateway</text>
    <text x="750" y="530" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="9">OpenCode / AI Gateway</text>
  </g>

  <!-- SQLite callout -->
  <g filter="url(#s)">
    <rect x="665" y="90" width="170" height="68" rx="8" fill="#172554" stroke="#3b82f6" stroke-width="1"/>
    <text x="750" y="112" text-anchor="middle" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Every DO uses SQLite</text>
    <text x="750" y="130" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">Messages, config, secrets,</text>
    <text x="750" y="144" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">files, tasks -- all durable</text>
  </g>
  <line x1="665" y1="124" x2="620" y2="124" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Footer -->
  <text x="430" y="552" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="11">Your code, your models, your data. Dodo is the platform -- you bring the LLM.</text>
</svg>